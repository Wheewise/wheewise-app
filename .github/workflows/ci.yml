name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, Typecheck, Unit Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app

      - name: Generate Prisma client
        run: npm run db:generate
        working-directory: app

      - name: Lint
        run: npm run lint
        working-directory: app

      - name: Typecheck
        run: npm run typecheck
        working-directory: app

      - name: Unit tests
        run: npm run test
        working-directory: app

      - name: Build
        run: npm run build
        working-directory: app
        env:
          # Build requires env validation to pass. These are placeholders that
          # only have to satisfy lib/env.ts's Zod schema during `next build`.
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          AUTH_SECRET: dummy-build-only-secret-not-used-at-runtime-xx
          NEXT_PUBLIC_APP_URL: https://wheewise.in

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality

    # Spin up a real Postgres instance so the showcase/browse pages can query
    # seeded data instead of hitting the Neon WebSocket proxy with a placeholder URL.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: e2e
          POSTGRES_PASSWORD: e2e
          POSTGRES_DB: e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: app

      - name: Generate Prisma client
        run: npm run db:generate
        working-directory: app

      - name: Migrate and seed database
        run: |
          npx prisma migrate deploy
          npm run db:seed
        working-directory: app
        env:
          DATABASE_URL: postgresql://e2e:e2e@localhost:5432/e2e
          NODE_ENV: development

      - name: Run E2E
        run: npm run test:e2e
        working-directory: app
        env:
          DATABASE_URL: postgresql://e2e:e2e@localhost:5432/e2e
          AUTH_SECRET: e2e-build-only-secret-not-used-at-runtime-xxxx
          NEXT_PUBLIC_APP_URL: http://localhost:3017
          E2E_DEMO_SLUG: sharma-auto-indore
          # Run as development so the server accepts dev-only flags at startup
          NODE_ENV: development
          # Mock external KYC/RTO APIs — real credentials are not available in CI
          WHEEWISE_MOCK_GST: 1
          WHEEWISE_MOCK_RTO: 1
          # Bypass OTP check and enable instant dev sign-in for E2E flows
          OTP_DEV_BYPASS: 1
          WHEEWISE_DEV_LOGIN: 1

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 7
